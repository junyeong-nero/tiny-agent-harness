provider: openrouter

models:
    default: nvidia/nemotron-3-nano-30b-a3b:free
    supervisor: nvidia/nemotron-3-nano-30b-a3b:free
    planner: nvidia/nemotron-3-nano-30b-a3b:free
    worker: nvidia/nemotron-3-nano-30b-a3b:free
    verifier: nvidia/nemotron-3-nano-30b-a3b:free

llm:
    max_retries: 10

tools:
    supervisor: []
    planner:
        - list_files
        - search
        - glob
    explorer:
        - list_files
        - search
        - glob
        - read_file
        - git_status
        - git_diff
    worker:
        - bash
        - read_file
        - replace_in_file
        - apply_patch
        - git_status
    verifier:
        - read_file
        - search
        - glob
        - list_files
        - git_status
        - git_diff
