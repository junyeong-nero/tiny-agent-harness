provider: openai

models:
    default: gpt-4o-mini
    supervisor: gpt-4o-mini
    planner: gpt-4o-mini
    worker: gpt-4o-mini
    verifier: gpt-4o-mini

llm:
    max_retries: 10

tools:
    supervisor: []
    planner:
        - list_files
        - search
        - glob
    explorer:
        - list_files
        - search
        - glob
        - read_file
        - git_status
        - git_diff
    worker:
        - bash
        - read_file
        - search
        - glob
        - list_files
        - replace_in_file
        - apply_patch
        - git_status
    verifier:
        - read_file
        - search
        - glob
        - list_files
        - git_status
        - git_diff
