provider: openai

models:
    default: gpt-4o-mini
    planner: gpt-4o-mini
    worker: gpt-4o-mini
    reviewer: gpt-4o-mini

llm:
    max_retries: 10

runtime:
    planner_max_tool_steps: 10
    worker_max_tool_steps: 10
    reviewer_max_tool_steps: 10

tools:
    planner:
        - list_files
        - search
    worker:
        - bash
        - read_file
        - search
        - list_files
        - apply_patch
    reviewer:
        - read_file
        - search
        - list_files
        - git_diff
