provider: openai

models:
    default: gpt-4o-mini
    supervisor: gpt-4o-mini
    planner: gpt-4o-mini
    worker: gpt-4o-mini
    verifier: gpt-4o-mini

llm:
    max_retries: 10

tools:
    supervisor: []
    planner:
        - list_files
        - search
    worker:
        - bash
        - read_file
        - search
        - list_files
        - apply_patch
    verifier:
        - read_file
        - search
        - list_files
        - git_diff
